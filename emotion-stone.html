<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情绪池 · 投石问心</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: "Noto Serif SC", serif;
  background: linear-gradient(180deg,
    #e0f0f0 0%,
    #c8e8e8 15%,
    #b0e0e0 35%,
    #a0d8d8 55%,
    #90d0d0 75%,
    #80c8c8 100%
  );
  overflow: hidden;
  position: relative;
  color: #3a5860;
}

/* ===== 巨大浅绿叶子背景 ===== */
.giant-leaf {
  position: fixed;
  top: -30%;
  left: -20%;
  width: 140%;
  height: 160%;
  background:
    radial-gradient(ellipse 80% 60% at 30% 40%, rgba(160,220,210,0.2), transparent 50%),
    radial-gradient(ellipse 60% 80% at 70% 60%, rgba(150,210,200,0.15), transparent 50%);
  z-index: 0;
  pointer-events: none;
}

.giant-leaf::before {
  content: '';
  position: absolute;
  top: 20%;
  left: 10%;
  width: 80%;
  height: 70%;
  background: radial-gradient(ellipse, rgba(180,230,220,0.12), transparent 60%);
  border-radius: 50% 50% 50% 50% / 40% 60% 60% 40%;
  filter: blur(40px);
}

/* ===== 水波层 ===== */
.water-layer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 38%;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(180,230,230,0.4) 0%, transparent 60%),
    linear-gradient(180deg,
      rgba(160,220,220,0.35) 0%,
      rgba(140,210,210,0.45) 20%,
      rgba(120,200,200,0.55) 45%,
      rgba(100,190,190,0.65) 70%,
      rgba(85,180,180,0.7) 100%
    );
  z-index: 1;
  overflow: hidden;
}

/* 水波纹线 - 多层波光 */
.water-ripple-line {
  position: absolute;
  width: 300%;
  height: 1.5px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.15) 20%,
    rgba(255,255,255,0.5) 50%,
    rgba(255,255,255,0.15) 80%,
    transparent 100%
  );
  animation: water-wave 6s ease-in-out infinite;
  filter: blur(0.3px);
}

@keyframes water-wave {
  0%, 100% { transform: translateX(-66%); }
  50% { transform: translateX(0); }
}

/* 水面波光闪烁 */
.water-sparkle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  box-shadow: 0 0 8px 2px rgba(255,255,255,0.6);
  animation: sparkle-twinkle 2s ease-in-out infinite;
  pointer-events: none;
}

@keyframes sparkle-twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* 涟漪效果 */
.ripple-effect {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.5);
  box-shadow: 0 0 15px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.1);
  animation: ripple-expand 3s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple-expand {
  0% { width: 15px; height: 8px; opacity: 0.9; }
  30% { opacity: 0.6; }
  100% { width: 280px; height: 140px; opacity: 0; }
}

/* ===== 上升气泡 ===== */
.rising-bubble {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.15) 60%, transparent 100%);
  border: 0.5px solid rgba(255,255,255,0.35);
  box-shadow: 0 0 6px rgba(255,255,255,0.3), inset 0 0 4px rgba(255,255,255,0.5);
  animation: bubble-rise linear forwards;
  pointer-events: none;
}

@keyframes bubble-rise {
  0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
  5% { opacity: 0.7; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-110vh) scale(0.25) rotate(180deg); opacity: 0; }
}

/* ===== 锦鲤 ===== */
.koi-fish {
  position: absolute;
  z-index: 5;
  pointer-events: none;
  animation: koi-swim 22s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

@keyframes koi-swim {
  0% { left: -120px; transform: scaleX(1) translateY(0); }
  20% { transform: scaleX(1) translateY(-8px); }
  45% { left: calc(100% + 120px); transform: scaleX(1) translateY(4px); }
  50% { left: calc(100% + 120px); transform: scaleX(-1) translateY(0); }
  70% { transform: scaleX(-1) translateY(-6px); }
  95% { left: -120px; transform: scaleX(-1) translateY(3px); }
  100% { left: -120px; transform: scaleX(1) translateY(0); }
}

.koi-fish svg {
  filter: drop-shadow(0 2px 4px rgba(200,100,50,0.2));
}

/* 锦鲤尾鳍摆动 */
.koi-tail {
  transform-origin: center;
  animation: tail-sway 0.8s ease-in-out infinite alternate;
}

@keyframes tail-sway {
  0% { transform: rotate(-8deg); }
  100% { transform: rotate(8deg); }
}

/* ===== 树叶圆圈 ===== */
.leaf-circle {
  position: absolute;
  left: 50%;
  top: 38%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  z-index: 10;
}

/* 中央诗句 */
.poem-display {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 180px;
  text-align: center;
  z-index: 12;
  opacity: 0;
  transition: all 0.7s ease;
  pointer-events: none;
}

.poem-display.show {
  opacity: 1;
}

.poem-display p {
  font-size: 0.85rem;
  color: #3a6870;
  font-style: italic;
  line-height: 1.8;
  text-shadow: 0 1px 8px rgba(255,255,255,0.6);
}

.poem-display .mood-tag {
  font-size: 0.7rem;
  color: #6a9098;
  margin-top: 8px;
  letter-spacing: 0.1em;
}

/* 情绪石头 - 通透鹅卵石 */
.mood-leaf {
  position: absolute;
  width: 48px;
  height: 42px;
  border-radius: 45% 55% 50% 50% / 55% 50% 55% 45%;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1.5px solid rgba(255,255,255,0.6);
  box-shadow:
    0 6px 20px rgba(0,0,0,0.1),
    inset 0 0 20px rgba(255,255,255,0.5),
    inset 0 0 8px rgba(255,255,255,0.8);
  z-index: 11;
  backdrop-filter: blur(2px);
}

.mood-leaf::before {
  content: '';
  position: absolute;
  top: 12%;
  left: 18%;
  width: 35%;
  height: 22%;
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
  border-radius: 50%;
  transform: rotate(-25deg);
  pointer-events: none;
}

.mood-leaf::after {
  content: '';
  position: absolute;
  bottom: 15%;
  right: 20%;
  width: 18%;
  height: 12%;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  pointer-events: none;
}

.mood-leaf:hover {
  transform: scale(1.3) rotate(3deg);
  box-shadow:
    0 10px 35px rgba(0,0,0,0.15),
    0 0 40px rgba(255,255,255,0.3),
    inset 0 0 25px rgba(255,255,255,0.6),
    inset 0 0 12px rgba(255,255,255,0.9);
}

.mood-leaf.active {
  transform: scale(1.4) rotate(5deg);
  box-shadow:
    0 0 50px rgba(255,255,255,0.5),
    0 0 80px rgba(255,255,255,0.2),
    inset 0 0 30px rgba(255,255,255,0.7);
  z-index: 15;
}

/* ===== 右下角漂流瓶 - 梦幻水晶 ===== */
.bottle-container {
  position: absolute;
  right: 15px;
  bottom: 130px;
  z-index: 15;
  text-align: center;
}

.bottle {
  width: 56px;
  height: 95px;
  position: relative;
  margin: 0 auto 8px;
  filter: drop-shadow(0 8px 20px rgba(160,200,220,0.3));
}

/* 瓶身 */
.bottle-body {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 44px;
  height: 62px;
  background: linear-gradient(165deg,
    rgba(255,255,255,0.5) 0%,
    rgba(220,240,245,0.35) 30%,
    rgba(200,230,240,0.3) 60%,
    rgba(180,220,235,0.4) 100%
  );
  border-radius: 10px 10px 50% 50%;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow:
    inset 0 0 25px rgba(255,255,255,0.5),
    inset 0 0 8px rgba(200,230,255,0.3),
    0 6px 18px rgba(100,160,180,0.15);
  overflow: hidden;
}

/* 瓶身高光 */
.bottle-body::before {
  content: '';
  position: absolute;
  top: 8%;
  left: 15%;
  width: 25%;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
  border-radius: 50%;
  transform: rotate(-15deg);
}

.bottle-body::after {
  content: '';
  position: absolute;
  top: 20%;
  right: 20%;
  width: 8%;
  height: 30%;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: rotate(10deg);
}

/* 瓶口 */
.bottle-neck {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 26px;
  background: linear-gradient(165deg,
    rgba(255,255,255,0.55),
    rgba(220,240,245,0.4),
    rgba(200,230,240,0.35)
  );
  border-radius: 5px 5px 3px 3px;
  border: 1.5px solid rgba(255,255,255,0.7);
  box-shadow: inset 0 0 12px rgba(255,255,255,0.4);
}

/* 瓶塞 - 梦幻星光 */
.bottle-cork {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 10px;
  background: linear-gradient(180deg,
    rgba(255,230,200,0.8),
    rgba(230,200,160,0.7),
    rgba(210,180,140,0.6)
  );
  border-radius: 3px 3px 1px 1px;
  box-shadow: 0 2px 6px rgba(200,170,130,0.3);
}

.bottle-cork::before {
  content: '';
  position: absolute;
  top: -3px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 5px;
  background: rgba(255,230,200,0.9);
  border-radius: 1px;
}

/* 瓶内星光 */
.bottle-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  box-shadow: 0 0 6px 2px rgba(255,255,255,0.5);
  animation: star-twinkle 2s ease-in-out infinite;
}

@keyframes star-twinkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* 瓶内石头 */
.bottle-stone {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 45% 55% 50% 50%;
  opacity: 0.8;
  animation: bottle-float 4s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(255,255,255,0.3), inset 0 0 4px rgba(255,255,255,0.4);
}

@keyframes bottle-float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-5px) rotate(5deg); }
  66% { transform: translateY(-2px) rotate(-3deg); }
}

/* ===== 木架 - 梦幻树枝 ===== */
.rack-container {
  position: absolute;
  right: 85px;
  bottom: 130px;
  z-index: 15;
  text-align: center;
}

.wood-rack {
  width: 55px;
  height: 85px;
  position: relative;
  margin: 0 auto 8px;
  filter: drop-shadow(0 6px 15px rgba(140,120,100,0.2));
}

/* 架子竖杆 - 自然树枝 */
.rack-pole {
  position: absolute;
  width: 3.5px;
  height: 100%;
  background: linear-gradient(180deg,
    rgba(160,140,120,0.5) 0%,
    rgba(140,120,100,0.6) 50%,
    rgba(120,100,80,0.5) 100%
  );
  border-radius: 2px;
}

.rack-pole.left { left: 8px; transform: rotate(-2deg); }
.rack-pole.right { right: 8px; transform: rotate(2deg); }

/* 架子横杆 */
.rack-bar {
  position: absolute;
  left: 4px;
  right: 4px;
  height: 2.5px;
  background: linear-gradient(90deg,
    rgba(150,130,110,0.4),
    rgba(170,150,130,0.6),
    rgba(150,130,110,0.4)
  );
  border-radius: 2px;
}

.rack-bar:nth-child(3) { top: 22px; }
.rack-bar:nth-child(4) { top: 52px; }

/* 架子上挂的石头 - 带光晕 */
.rack-stone {
  position: absolute;
  width: 11px;
  height: 11px;
  border-radius: 45% 55% 50% 50%;
  opacity: 0.75;
  animation: rack-sway 5s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(255,255,255,0.2), inset 0 0 5px rgba(255,255,255,0.3);
}

.rack-stone::before {
  content: '';
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 10px;
  background: linear-gradient(180deg, rgba(180,160,140,0.4), rgba(180,160,140,0.1));
}

.rack-stone::after {
  content: '';
  position: absolute;
  top: 15%;
  left: 20%;
  width: 35%;
  height: 25%;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: rotate(-20deg);
}

@keyframes rack-sway {
  0%, 100% { transform: rotate(-6deg) translateY(0); }
  50% { transform: rotate(6deg) translateY(-2px); }
}

/* ===== 计数器 ===== */
.counter {
  font-size: 0.7rem;
  color: #4a7880;
  letter-spacing: 0.05em;
  text-shadow: 0 1px 4px rgba(255,255,255,0.5);
}

.counter .num {
  font-size: 0.9rem;
  font-weight: 500;
  color: #2a6870;
}

/* ===== 底部投石按钮 ===== */
.cast-bar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.cast-btn {
  padding: 14px 48px;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.15));
  border: 2.5px solid rgba(255,255,255,0.6);
  border-radius: 35px;
  font-family: "Noto Serif SC", serif;
  font-size: 1.05rem;
  color: #4a6050;
  cursor: pointer;
  backdrop-filter: blur(12px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
  letter-spacing: 0.15em;
}

.cast-btn:hover {
  background: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0.25));
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.cast-btn:active {
  transform: translateY(-1px) scale(0.98);
}

/* ===== 便签弹窗 ===== */
.note-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.note-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.note-card {
  width: 340px;
  padding: 35px 30px 25px;
  background: linear-gradient(145deg, #fffbf5, #fff5e8);
  border-radius: 16px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.25);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.4s ease;
}

.note-overlay.open .note-card {
  transform: translateY(0);
}

/* 便签胶带 */
.note-card::before {
  content: '';
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  width: 50px;
  height: 22px;
  background: linear-gradient(180deg, rgba(220,200,170,0.6), rgba(200,180,150,0.5));
  border-radius: 3px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.note-textarea {
  width: 100%;
  min-height: 130px;
  border: none;
  background: transparent;
  font-family: "Noto Serif SC", serif;
  font-size: 0.95rem;
  color: #4a5860;
  resize: none;
  outline: none;
  line-height: 1.9;
  letter-spacing: 0.03em;
}

.note-textarea::placeholder {
  color: #a09890;
  font-style: italic;
}

.note-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  padding-top: 15px;
  border-top: 1px solid rgba(200,190,180,0.3);
}

.char-count {
  font-size: 0.7rem;
  color: #b0a898;
}

.stone-btn {
  padding: 10px 32px;
  background: linear-gradient(135deg, #c8b8a0, #b0a088);
  border: none;
  border-radius: 25px;
  font-family: "Noto Serif SC", serif;
  font-size: 0.9rem;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(160,140,120,0.3);
  transition: all 0.3s ease;
  letter-spacing: 0.1em;
}

.stone-btn:hover {
  background: linear-gradient(135deg, #d0c0a8, #b8a890);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(160,140,120,0.4);
}

/* ===== 飞行石头 ===== */
.flying-stone {
  position: fixed;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #d0c0b0, #b8a898);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2), inset 0 0 10px rgba(255,255,255,0.3);
  z-index: 60;
  pointer-events: none;
  transition: all 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ===== 标题 ===== */
.header {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 20;
}

.header h1 {
  font-weight: 400;
  font-size: 1.4rem;
  letter-spacing: 0.3em;
  color: #3a5860;
  margin-bottom: 6px;
  text-shadow: 0 2px 10px rgba(255,255,255,0.5);
}

.header p {
  font-size: 0.78rem;
  color: #5a8090;
  font-style: italic;
  letter-spacing: 0.08em;
}

/* ===== 品牌 ===== */
.brand {
  position: absolute;
  top: 25px;
  right: 30px;
  font-size: 0.6rem;
  color: #6a9098;
  letter-spacing: 0.2em;
  opacity: 0.35;
  z-index: 20;
  writing-mode: vertical-rl;
}
</style>
</head>
<body>
  <!-- 背景 -->
  <div class="giant-leaf"></div>

  <!-- 水波 -->
  <div class="water-layer" id="waterLayer">
    <div class="water-ripple-line" style="top:20%; animation-delay:0s;"></div>
    <div class="water-ripple-line" style="top:40%; animation-delay:1.5s;"></div>
    <div class="water-ripple-line" style="top:60%; animation-delay:3s;"></div>
    <div class="water-ripple-line" style="top:80%; animation-delay:0.8s;"></div>
  </div>

  <!-- 标题 -->
  <div class="header">
    <h1>情绪池</h1>
    <p>点击一片叶子，听听它的诗句</p>
  </div>

  <div class="brand">投石问心</div>

  <!-- 树叶圆圈 -->
  <div class="leaf-circle" id="leafCircle"></div>

  <!-- 中央诗句 -->
  <div class="poem-display" id="poemDisplay">
    <p id="poemText"></p>
    <div class="mood-tag" id="moodTag"></div>
  </div>

  <!-- 漂流瓶 -->
  <div class="bottle-container">
    <div class="bottle" id="bottle">
      <div class="bottle-neck"></div>
      <div class="bottle-cork"></div>
      <div class="bottle-body"></div>
    </div>
    <div class="counter">好情绪 <span class="num" id="goodCount">0</span></div>
  </div>

  <!-- 木架 -->
  <div class="rack-container">
    <div class="wood-rack" id="woodRack">
      <div class="rack-pole left"></div>
      <div class="rack-pole right"></div>
      <div class="rack-bar"></div>
      <div class="rack-bar"></div>
    </div>
    <div class="counter">待释放 <span class="num" id="badCount">0</span></div>
  </div>

  <!-- 底部按钮 -->
  <div class="cast-bar">
    <button class="cast-btn" id="castBtn">🪨 投石写心情</button>
  </div>

  <!-- 便签弹窗 -->
  <div class="note-overlay" id="noteOverlay">
    <div class="note-card">
      <textarea class="note-textarea" id="noteTextarea" placeholder="把此刻的心情，写成一句话...
"></textarea>
      <div class="note-actions">
        <span class="char-count" id="charCount">0 字</span>
        <button class="stone-btn" id="stoneBtn">投石头</button>
      </div>
    </div>
  </div>

  <script>
    // ===== 情绪数据（12片树叶） =====
    const moods = [
      // 好情绪 → 漂流瓶
      { id: 'joy', name: '喜悦', color: '#e8a0a0', glow: '#f5c0c0', poem: '「热烈绽放，是你本来的样子」', type: 'good' },
      { id: 'warm', name: '温暖', color: '#e8c8a0', glow: '#f5e0c0', poem: '「被阳光晒过的时刻，值得记住」', type: 'good' },
      { id: 'hope', name: '期待', color: '#f0c090', glow: '#f8dcb0', poem: '「光在来的路上，你只需要等」', type: 'good' },
      { id: 'calm', name: '平静', color: '#90c8b8', glow: '#b0e0d0', poem: '「水面无风，心自澄明」', type: 'good' },
      { id: 'growth', name: '希望', color: '#98d0a0', glow: '#b8e8c0', poem: '「种子在土里，别急着挖开看」', type: 'good' },
      { id: 'gratitude', name: '感恩', color: '#d8c898', glow: '#f0e8c0', poem: '「谢谢你来过，谢谢我还在」', type: 'good' },
      // 坏情绪 → 木架
      { id: 'anxiety', name: '焦虑', color: '#b8b8b8', glow: '#d0d0d0', poem: '「风暴前的安静，也是力量」', type: 'bad' },
      { id: 'sad', name: '忧郁', color: '#98b8d0', glow: '#b8d0e8', poem: '「雨会下完，云记得所有形状」', type: 'bad' },
      { id: 'tired', name: '疲惫', color: '#c8b8a0', glow: '#e0d0c0', poem: '「累不是软弱，是身体在诚实说话」', type: 'bad' },
      { id: 'wronged', name: '委屈', color: '#c8b0d8', glow: '#e0d0f0', poem: '「被误解的感觉，不需要合理化」', type: 'bad' },
      { id: 'broken', name: '心碎', color: '#e8c0d8', glow: '#f5e0f0', poem: '「碎片也是完整的，只是方式不同」', type: 'bad' },
      { id: 'empty', name: '空洞', color: '#d8d8d0', glow: '#f0f0e8', poem: '「空白不是缺失，是空间」', type: 'bad' }
    ];

    // ===== 音效系统（Web Audio API） =====
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
    }

    function playTone(freq, duration, type = 'sine') {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playClickSound() {
      playTone(520, 0.12);
      setTimeout(() => playTone(784, 0.08, 'triangle'), 50);
    }
    function playPoemSound() {
      playTone(440, 0.3);
      setTimeout(() => playTone(554, 0.2), 100);
      setTimeout(() => playTone(659, 0.4), 200);
    }
    function flySound() {
      playTone(600, 0.15);
      setTimeout(() => playTone(800, 0.2), 80);
    }
    function dropSound() {
      playTone(350, 0.3, 'sine');
    }
    function rippleSound() {
      playTone(200, 0.5, 'sine');
      setTimeout(() => playTone(150, 0.3, 'sine'), 100);
    }
    function openNoteSound() {
      playTone(440, 0.1);
      setTimeout(() => playTone(550, 0.1), 80);
      setTimeout(() => playTone(660, 0.15), 160);
    }
    function castSound() {
      playTone(300, 0.15);
      setTimeout(() => playTone(500, 0.2), 100);
      setTimeout(() => playTone(700, 0.25), 250);
    }

    // ===== 生成树叶圆圈 =====
    const circle = document.getElementById('leafCircle');
    const radius = 125;

    moods.forEach((mood, i) => {
      const angle = (i * 30 - 90) * Math.PI / 180;
      const x = radius * Math.cos(angle) + 150 - 23;
      const y = radius * Math.sin(angle) + 150 - 23;

      const leaf = document.createElement('div');
      leaf.className = 'mood-leaf';
      leaf.style.cssText = `left:${x}px; top:${y}px; background:radial-gradient(ellipse at 35% 30%, ${mood.color}ee, ${mood.glow}88 60%, ${mood.color}44 100%);`;
      leaf.title = mood.name + ' · ' + mood.poem;
      leaf.dataset.index = i;

      leaf.addEventListener('click', () => selectMood(mood, leaf));
      circle.appendChild(leaf);
    });

    let goodCount = 0, badCount = 0;
    let selectedMood = null;

    function selectMood(mood, element) {
      playClickSound();
      document.querySelectorAll('.mood-leaf').forEach(l => l.classList.remove('active'));
      element.classList.add('active');
      selectedMood = mood;

      // 显示诗句
      const display = document.getElementById('poemDisplay');
      document.getElementById('poemText').textContent = mood.poem;
      document.getElementById('moodTag').textContent = '— ' + mood.name + ' —';
      display.classList.add('show');

      // 延迟后飞到容器
      setTimeout(() => {
        playPoemSound();
        flyToContainer(mood, element);
      }, 600);
    }

    function flyToContainer(mood, element) {
      const rect = element.getBoundingClientRect();
      const flyer = element.cloneNode(true);
      flyer.style.position = 'fixed';
      flyer.style.left = rect.left + 'px';
      flyer.style.top = rect.top + 'px';
      flyer.style.zIndex = '100';
      flyer.style.transition = 'all 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      flyer.classList.remove('active');
      document.body.appendChild(flyer);

      let targetId, countId;
      if (mood.type === 'good') {
        targetId = 'bottle';
        countId = 'goodCount';
        goodCount++;
      } else {
        targetId = 'woodRack';
        countId = 'badCount';
        badCount++;
      }

      const target = document.getElementById(targetId).getBoundingClientRect();

      setTimeout(() => {
        flyer.style.left = (target.left + target.width/2 - 18) + 'px';
        flyer.style.top = (target.top + target.height/2 - 18) + 'px';
        flyer.style.transform = 'scale(0.3)';
        flyer.style.opacity = '0.5';
      }, 50);

      setTimeout(() => {
        flyer.remove();
        flySound();
        document.getElementById(countId).textContent = mood.type === 'good' ? goodCount : badCount;

        // 添加到容器视觉效果
        if (mood.type === 'good') {
          addBottleStone(mood);
        } else {
          addRackStone(mood);
        }
      }, 950);
    }

    function addBottleStone(mood) {
      const stone = document.createElement('div');
      stone.className = 'bottle-stone';
      stone.style.cssText = `
        left: ${10 + Math.random() * 20}px;
        bottom: ${8 + Math.random() * 25}px;
        background: radial-gradient(ellipse at 35% 30%, ${mood.color}dd, ${mood.glow}aa);
        animation-delay: ${Math.random() * 4}s;
      `;
      document.getElementById('bottle').appendChild(stone);

      // 添加星光
      const star = document.createElement('div');
      star.className = 'bottle-star';
      star.style.cssText = `
        left: ${8 + Math.random() * 28}px;
        bottom: ${10 + Math.random() * 40}px;
        animation-delay: ${Math.random() * 2}s;
      `;
      document.getElementById('bottle').appendChild(star);
    }

    function addRackStone(mood) {
      const stone = document.createElement('div');
      stone.className = 'rack-stone';
      const row = Math.random() > 0.5 ? 28 : 58;
      const col = 12 + Math.random() * 36;
      stone.style.cssText = `
        left: ${col}px;
        top: ${row}px;
        background: radial-gradient(circle, ${mood.color}, ${mood.glow});
        animation-delay: ${Math.random() * 3}s;
      `;
      document.getElementById('woodRack').appendChild(stone);
    }

    // ===== 气泡系统 =====
    function createBubble() {
      const b = document.createElement('div');
      b.className = 'rising-bubble';
      const size = 3 + Math.random() * 10;
      const leftPos = 5 + Math.random() * 90;
      const delay = Math.random() * 2;
      b.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${leftPos}%;
        bottom: ${Math.random() * 20}%;
        animation-duration: ${12 + Math.random() * 15}s;
        animation-delay: -${delay}s;
      `;
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 28000);
    }
    setInterval(createBubble, 250);

    // ===== 锦鲤系统 =====
    function spawnKoi() {
      const koi = document.createElement('div');
      koi.className = 'koi-fish';
      const y = 55 + Math.random() * 30;
      const size = 55 + Math.random() * 25;
      const hue = Math.random() > 0.5 ? 20 : 15; // 橙红或金黄
      const bodyColor = hue === 20 ? '#e87850' : '#f0a040';
      const accentColor = hue === 20 ? '#ff9a70' : '#ffc060';
      const tailColor = hue === 20 ? '#d06040' : '#e89030';

      koi.style.cssText = `
        bottom: ${y}%;
        animation-duration: ${18 + Math.random() * 12}s;
        animation-delay: ${Math.random() * 3}s;
      `;

      koi.innerHTML = `
        <svg width="${size * 1.6}" height="${size * 0.65}" viewBox="0 0 80 32" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bodyGrad${hue}" x1="0%" y1="50%" x2="100%" y2="50%">
              <stop offset="0%" style="stop-color:${accentColor};stop-opacity:0.9" />
              <stop offset="50%" style="stop-color:${bodyColor};stop-opacity:0.95" />
              <stop offset="100%" style="stop-color:${tailColor};stop-opacity:0.85" />
            </linearGradient>
            <radialGradient id="spotGrad" cx="30%" cy="30%" r="40%">
              <stop offset="0%" style="stop-color:rgba(255,255,255,0.7)" />
              <stop offset="100%" style="stop-color:rgba(255,255,255,0)" />
            </radialGradient>
          </defs>

          <!-- 尾鳍 -->
          <g class="koi-tail">
            <path d="M 62 16 Q 75 6 78 12 Q 80 16 78 20 Q 75 26 62 16"
              fill="${tailColor}" opacity="0.75" />
            <path d="M 62 16 Q 72 10 75 14 Q 76 16 75 18 Q 72 22 62 16"
              fill="${accentColor}" opacity="0.5" />
          </g>

          <!-- 背鳍 -->
          <path d="M 30 8 Q 40 2 50 6 Q 45 8 40 8 Q 35 8 30 8"
            fill="${bodyColor}" opacity="0.7" />

          <!-- 身体主体 -->
          <ellipse cx="38" cy="16" rx="26" ry="12"
            fill="url(#bodyGrad${hue})" />

          <!-- 腹部高光 -->
          <ellipse cx="36" cy="20" rx="20" ry="5"
            fill="rgba(255,255,255,0.25)" />

          <!-- 鱼鳞纹理 -->
          <g opacity="0.3">
            <ellipse cx="28" cy="14" rx="5" ry="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" />
            <ellipse cx="35" cy="13" rx="5" ry="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" />
            <ellipse cx="42" cy="14" rx="5" ry="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" />
            <ellipse cx="32" cy="18" rx="5" ry="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" />
            <ellipse cx="39" cy="18" rx="5" ry="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" />
          </g>

          <!-- 斑点 -->
          <circle cx="32" cy="14" r="2.5" fill="url(#spotGrad)" opacity="0.6" />
          <circle cx="42" cy="16" r="2" fill="url(#spotGrad)" opacity="0.5" />
          <circle cx="36" cy="12" r="1.5" fill="url(#spotGrad)" opacity="0.4" />

          <!-- 眼睛 -->
          <ellipse cx="18" cy="13" rx="2.5" ry="3" fill="rgba(0,0,0,0.6)" />
          <circle cx="17.5" cy="12" r="1" fill="rgba(255,255,255,0.9)" />

          <!-- 胸鳍 -->
          <path d="M 26 22 Q 24 28 28 26 Q 30 24 26 22"
            fill="${bodyColor}" opacity="0.6" />

          <!-- 嘴 -->
          <ellipse cx="14" cy="16" rx="2" ry="1.5"
            fill="${tailColor}" opacity="0.7" />

          <!-- 须 -->
          <path d="M 13 17 Q 10 20 8 18" stroke="${tailColor}" stroke-width="0.5" fill="none" opacity="0.5" />
        </svg>
      `;
      document.body.appendChild(koi);
      setTimeout(() => koi.remove(), 35000);
    }
    setInterval(spawnKoi, 6000);
    setTimeout(spawnKoi, 800);

    // ===== 水波涟漪 =====
    function createRipple(x, y) {
      const r = document.createElement('div');
      r.className = 'ripple-effect';
      r.style.left = (x - 10) + 'px';
      r.style.top = (y - 5) + 'px';
      document.body.appendChild(r);
      rippleSound();
      setTimeout(() => r.remove(), 2500);
    }

    // ===== 投石写心情 =====
    const castBtn = document.getElementById('castBtn');
    const noteOverlay = document.getElementById('noteOverlay');
    const stoneBtn = document.getElementById('stoneBtn');
    const noteTextarea = document.getElementById('noteTextarea');
    const charCount = document.getElementById('charCount');

    castBtn.addEventListener('click', () => {
      openNoteSound();
      noteOverlay.classList.add('open');
      noteTextarea.focus();
    });

    noteOverlay.addEventListener('click', (e) => {
      if (e.target === noteOverlay) noteOverlay.classList.remove('open');
    });

    noteTextarea.addEventListener('input', () => {
      charCount.textContent = noteTextarea.value.length + ' 字';
    });

    stoneBtn.addEventListener('click', () => {
      const text = noteTextarea.value.trim();
      if (!text) return;

      noteOverlay.classList.remove('open');
      castSound();

      // 创建飞行石头
      const stone = document.createElement('div');
      stone.className = 'flying-stone';
      const btnRect = castBtn.getBoundingClientRect();
      stone.style.left = (btnRect.left + btnRect.width/2 - 18) + 'px';
      stone.style.top = (btnRect.top - 18) + 'px';
      document.body.appendChild(stone);

      // 目标：水面随机位置
      const water = document.getElementById('waterLayer').getBoundingClientRect();
      const targetX = water.left + water.width * (0.3 + Math.random() * 0.4) - 18;
      const targetY = water.top + water.height * (0.3 + Math.random() * 0.4) - 18;

      setTimeout(() => {
        stone.style.left = targetX + 'px';
        stone.style.top = targetY + 'px';
        stone.style.transform = 'scale(0.5) rotate(360deg)';
      }, 50);

      setTimeout(() => {
        stone.remove();
        dropSound();
        createRipple(targetX + 18, targetY + 18);
        noteTextarea.value = '';
        charCount.textContent = '0 字';
      }, 1000);
    });

    // ===== 水面星光 =====
    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'water-sparkle';
      const water = document.getElementById('waterLayer').getBoundingClientRect();
      sparkle.style.cssText = `
        left: ${water.left + Math.random() * water.width}px;
        top: ${water.top + Math.random() * water.height}px;
        animation-delay: ${Math.random() * 2}s;
      `;
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 4000);
    }
    setInterval(createSparkle, 800);

    // 定期随机涟漪
    setInterval(() => {
      const water = document.getElementById('waterLayer').getBoundingClientRect();
      const x = water.left + Math.random() * water.width;
      const y = water.top + Math.random() * water.height;
      createRipple(x, y);
    }, 4000);
  </script>
</body>
</html>
