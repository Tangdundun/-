<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情绪池 - 选色</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #faf8f5 0%, #f0e8dc 30%, #e5ddd0 60%, #d8d0c4 100%);
      font-family: "Noto Serif SC", serif;
      color: #6b5d4f;
      overflow: hidden;
      position: relative;
    }

    /* 水波背景 */
    .water-bg {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(ellipse 300px 150px at 30% 40%, rgba(232,224,212,0.4) 0%, transparent 60%),
                  radial-gradient(ellipse 400px 200px at 70% 60%, rgba(224,216,204,0.3) 0%, transparent 50%);
      animation: wave 10s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes wave {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 20px) scale(1.02); }
    }

    /* 背景中逼真的橘色锦鲤 */
    .bg-koi {
      position: absolute;
      z-index: 1;
      opacity: 0.35;
    }

    .bg-koi .koi-body {
      width: 60px;
      height: 32px;
      background: linear-gradient(145deg, #f58a40 0%, #e86a20 40%, #c84810 100%);
      border-radius: 55% 45% 50% 50% / 60% 55% 45% 40%;
      position: relative;
      box-shadow:
        0 0 20px rgba(245,138,64,0.4),
        inset 0 -4px 10px rgba(180,60,20,0.3);
    }

    /* 鳞片闪光 */
    .bg-koi .koi-scales {
      position: absolute;
      top: 6px;
      left: 12px;
      width: 32px;
      height: 20px;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255,255,255,0.2) 0deg 15deg,
        transparent 15deg 30deg
      );
      background-size: 8px 6px;
    }

    /* 眼睛 */
    .bg-koi .koi-eye {
      position: absolute;
      left: 10px;
      top: 35%;
      width: 5px;
      height: 5px;
      background: #1a1a1a;
      border-radius: 50%;
      box-shadow: 0 0 2px rgba(0,0,0,0.5);
    }

    .bg-koi .koi-eye::after {
      content: '';
      position: absolute;
      left: 1px;
      top: 1px;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
    }

    /* 嘴巴 */
    .bg-koi .koi-mouth {
      position: absolute;
      right: 2px;
      top: 45%;
      width: 4px;
      height: 3px;
      background: #c84810;
      border-radius: 50%;
    }

    /* 尾巴 */
    .bg-koi .koi-tail {
      position: absolute;
      right: -18px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 32px;
      background: linear-gradient(145deg, #f58a40, #e86a20);
      border-radius: 20% 0 60% 20%;
      transform-origin: left center;
      animation: tail-wag 0.6s ease-in-out infinite;
    }

    @keyframes tail-wag {
      0%, 100% { transform: translateY(-50%) rotate(0deg); }
      50% { transform: translateY(-50%) rotate(15deg); }
    }

    /* 鱼鳍 */
    .bg-koi .koi-fin {
      position: absolute;
      background: linear-gradient(145deg, #e86a20, #c84810);
      border-radius: 50% 50% 30% 30%;
    }

    .bg-koi .koi-fin.dorsal {
      left: 25px;
      top: -4px;
      width: 16px;
      height: 10px;
    }

    .bg-koi .koi-fin.pectoral {
      left: 35px;
      top: 22px;
      width: 12px;
      height: 8px;
    }

    /* 闪光点 */
    .bg-koi .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: sparkle 2s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.9; transform: scale(1.2); }
    }

    /* 游动动画 */
    .bg-koi.koi1 { left: 5%; top: 12%; animation: swim-left 16s linear infinite; }
    .bg-koi.koi1 .koi-body { animation: koi-swim 3s ease-in-out infinite; }

    .bg-koi.koi2 { right: 8%; top: 60%; animation: swim-right 18s linear infinite; }
    .bg-koi.koi2 { transform: scaleX(-1); }
    .bg-koi.koi2 .koi-body { animation: koi-swim 3.5s ease-in-out infinite 0.5s; }

    .bg-koi.koi3 { left: 20%; bottom: 10%; animation: swim-left 20s linear infinite 1s; }
    .bg-koi.koi3 .koi-body { animation: koi-swim 4s ease-in-out infinite 1s; }

    @keyframes swim-left {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(calc(100vw + 100px)); }
    }

    @keyframes swim-right {
      0% { transform: translateX(100px) scaleX(-1); }
      100% { transform: translateX(calc(-100vw - 100px)) scaleX(-1); }
    }

    @keyframes koi-swim {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* 标题区 */
    .title-area {
      text-align: center;
      padding-top: 35px;
      margin-bottom: 15px;
      position: relative;
      z-index: 10;
    }

    h2 {
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: 0.25em;
      color: #5a5046;
      margin-bottom: 8px;
    }

    .guide-text {
      font-size: 0.9rem;
      color: #8b7d6b;
      font-style: italic;
      min-height: 20px;
      transition: all 0.3s;
    }

    /* 池塘 */
    .pond {
      position: relative;
      width: 520px;
      height: 520px;
      margin: 0 auto;
      z-index: 10;
    }

    /* 超大荷叶 */
    .lotus-leaf {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      height: 480px;
      background: radial-gradient(ellipse at 32% 28%, #a8d4a8 0%, #88c488 45%, #68a868 100%);
      border-radius: 52% 48% 50% 50% / 55% 52% 48% 45%;
      box-shadow:
        0 12px 50px rgba(70, 120, 70, 0.4),
        inset 0 -35px 100px rgba(255,255,255,0.2),
        inset 0 25px 50px rgba(90, 140, 90, 0.2);
      animation: leaf-breathe 10s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes leaf-breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -52%) scale(1.012); }
    }

    /* 荷叶褶皱 */
    .lotus-leaf::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(ellipse at 30% 25%, transparent 20%, rgba(0,0,0,0.03) 21%, transparent 22%) 0 0 / 60px 60px,
        radial-gradient(ellipse at 70% 60%, transparent 25%, rgba(0,0,0,0.04) 26%, transparent 27%) 0 0 / 80px 80px,
        conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.15) 0deg 3deg, transparent 3deg 8deg, rgba(255,255,255,0.1) 8deg 11deg, transparent 11deg 20deg);
      opacity: 0.8;
    }

    /* 主叶脉 */
    .vein {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 38%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      transform-origin: top center;
    }

    .vein:nth-child(1) { transform: translate(-50%, 0) rotate(0deg); height: 40%; }
    .vein:nth-child(2) { transform: translate(-50%, 0) rotate(28deg); }
    .vein:nth-child(3) { transform: translate(-50%, 0) rotate(58deg); }
    .vein:nth-child(4) { transform: translate(-50%, 0) rotate(90deg); }
    .vein:nth-child(5) { transform: translate(-50%, 0) rotate(122deg); }
    .vein:nth-child(6) { transform: translate(-50%, 0) rotate(152deg); height: 39%; }

    /* 荷叶边缘光晕 */
    .leaf-glow {
      position: absolute;
      inset: -8px;
      border-radius: inherit;
      filter: blur(15px);
      background: radial-gradient(ellipse at 65% 65%, transparent 40%, rgba(80,130,80,0.35) 100%);
      z-index: -1;
    }

    /* 小荷叶形状的情绪树叶 */
    .emotion-leaf {
      position: absolute;
      width: 48px;
      height: 42px;
      left: 50%;
      top: 50%;
      margin-left: -24px;
      margin-top: -21px;
      cursor: pointer;
      transition: all 0.4s ease;
      z-index: 20;
      animation: leaf-float 3.5s ease-in-out infinite;
    }

    .emotion-leaf .leaf-body {
      width: 100%;
      height: 100%;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
      box-shadow:
        0 4px 15px rgba(0,0,0,0.18),
        inset 0 -6px 15px rgba(0,0,0,0.1),
        inset 0 5px 10px rgba(255,255,255,0.35);
    }

    /* 小荷叶叶脉 */
    .emotion-leaf .leaf-body::before {
      content: '';
      position: absolute;
      top: 40%;
      left: 10%;
      width: 80%;
      height: 2px;
      background: linear-gradient(to right, rgba(255,255,255,0.5), rgba(255,255,255,0.1), transparent);
      transform: rotate(-8deg);
    }

    .emotion-leaf .leaf-body::after {
      content: '';
      position: absolute;
      top: 22%;
      left: 50%;
      width: 1px;
      height: 22%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    }

    .emotion-leaf:hover {
      transform: scale(1.22);
    }

    .emotion-leaf:hover .leaf-body {
      box-shadow:
        0 8px 25px rgba(0,0,0,0.22),
        inset 0 -6px 15px rgba(0,0,0,0.1),
        inset 0 6px 12px rgba(255,255,255,0.4);
    }

    .emotion-leaf.faded {
      opacity: 0.25;
      filter: grayscale(0.6);
      transform: scale(0.85) !important;
    }

    .emotion-leaf.caught {
      opacity: 0;
      transform: scale(0.15);
      transition: all 0.7s ease;
    }

    @keyframes leaf-float {
      0%, 100% { transform: translate(var(--x), var(--y)) translateY(0) rotate(var(--r)); }
      50% { transform: translate(var(--x), var(--y)) translateY(-6px) rotate(var(--r)); }
    }

    /* 渔网 */
    .net {
      position: absolute;
      width: 110px;
      height: 110px;
      left: 50%;
      top: 50%;
      margin-left: -55px;
      margin-top: -55px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: all 0.7s ease;
    }

    .net.active {
      opacity: 0.9;
    }

    .net svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.25));
    }

    /* 中央展示 */
    .display {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      width: 240px;
      z-index: 25;
    }

    .display.show {
      opacity: 1;
      pointer-events: auto;
    }

    .creature-home {
      width: 140px;
      height: 110px;
      margin: 0 auto 22px;
      position: relative;
    }

    /* 超逼真锦鲤 */
    .koi-container {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .koi-container.show { display: block; }

    .koi-wrapper {
      position: relative;
      width: 110px;
      height: 55px;
    }

    .koi-main {
      position: absolute;
      left: 15px;
      top: 8px;
      width: 75px;
      height: 42px;
      background: linear-gradient(145deg, #f5a55a 0%, #e88a48 30%, #d06a38 100%);
      border-radius: 55% 45% 50% 50% / 58% 52% 42% 45%;
      box-shadow:
        0 0 30px rgba(245,140,80,0.45),
        inset 0 -6px 18px rgba(160,60,20,0.35);
    }

    .koi-scales {
      position: absolute;
      top: 10px;
      left: 18px;
      width: 45px;
      height: 24px;
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255,255,255,0.12) 0deg 10deg,
        transparent 10deg 20deg
      );
      background-size: 10px 8px;
    }

    .koi-head {
      position: absolute;
      left: 72px;
      top: 14px;
      width: 28px;
      height: 24px;
      background: linear-gradient(145deg, #e88a48, #c86830);
      border-radius: 45% 45% 40% 40%;
    }

    .koi-eye {
      position: absolute;
      left: 5px;
      top: 6px;
      width: 6px;
      height: 6px;
      background: #1a1a1a;
      border-radius: 50%;
    }

    .koi-eye::after {
      content: '';
      position: absolute;
      left: 1px;
      top: 1px;
      width: 2.5px;
      height: 2.5px;
      background: #fff;
      border-radius: 50%;
    }

    .koi-mouth {
      position: absolute;
      right: 2px;
      top: 50%;
      width: 4px;
      height: 3px;
      background: #c86830;
      border-radius: 50%;
    }

    .koi-tail {
      position: absolute;
      left: -18px;
      top: 12px;
      width: 32px;
      height: 38px;
      background: linear-gradient(145deg, #f5a55a, #e88a48);
      border-radius: 25% 0 65% 30%;
      transform-origin: right center;
    }

    .koi-fin {
      position: absolute;
      background: linear-gradient(145deg, #e88a48, #d06a38);
      border-radius: 50% 50% 30% 30%;
    }

    .koi-fin.dorsal {
      left: 30px;
      top: -2px;
      width: 20px;
      height: 14px;
    }

    .koi-fin.pectoral {
      left: 45px;
      top: 40px;
      width: 16px;
      height: 11px;
    }

    .koi-container.swimming .koi-main {
      animation: koi-body 2.5s ease-in-out infinite;
    }

    .koi-container.swimming .koi-tail {
      animation: koi-tail 0.5s ease-in-out infinite;
    }

    @keyframes koi-body {
      0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
      25% { transform: translateX(6px) translateY(-4px) rotate(-2deg); }
      75% { transform: translateX(-4px) translateY(3px) rotate(1deg); }
    }

    @keyframes koi-tail {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(12deg); }
    }

    /* 超逼真乌龟 */
    .turtle-container {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .turtle-container.show { display: block; }

    .turtle-shell {
      width: 90px;
      height: 72px;
      background: linear-gradient(180deg, #6a8a58 0%, #4a6a38 50%, #3a5a28 100%);
      border-radius: 52% 48% 50% 50% / 55% 52% 48% 45%;
      position: relative;
      box-shadow: 0 0 25px rgba(70,100,50,0.45);
    }

    .turtle-shell::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 12px;
      background:
        linear-gradient(30deg, transparent 47%, rgba(255,255,255,0.18) 48%, rgba(255,255,255,0.18) 52%, transparent 53%) 0 0 / 18px 12px,
        linear-gradient(-30deg, transparent 47%, rgba(255,255,255,0.15) 48%, rgba(255,255,255,0.15) 52%, transparent 53%) 0 0 / 14px 10px;
      border-radius: 50%;
      opacity: 0.7;
    }

    .turtle-head {
      position: absolute;
      width: 28px;
      height: 22px;
      background: linear-gradient(180deg, #7a9a68, #5a7a48);
      border-radius: 45% 45% 40% 40%;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .turtle-head::before {
      content: '';
      position: absolute;
      top: 28%;
      left: 18%;
      width: 4px;
      height: 4px;
      background: #222;
      border-radius: 50%;
      box-shadow: 10px 0 0 #222;
    }

    .turtle-leg {
      position: absolute;
      width: 20px;
      height: 14px;
      background: linear-gradient(180deg, #5a7a48, #4a6a38);
      border-radius: 40%;
    }

    .turtle-leg.front-left { left: 3px; top: 18px; }
    .turtle-leg.front-right { right: 3px; top: 15px; }
    .turtle-leg.back-left { left: 6px; top: 50px; }
    .turtle-leg.back-right { right: 6px; top: 48px; }

    .turtle-container.swimming .turtle-leg {
      animation: leg-paddle 1s ease-in-out infinite;
    }

    .turtle-leg.front-left, .turtle-leg.back-right { animation-delay: 0s; }
    .turtle-leg.front-right, .turtle-leg.back-left { animation-delay: 0.5s; }

    @keyframes leg-paddle {
      0%, 100% { transform: rotate(-12deg); }
      50% { transform: rotate(12deg); }
    }

    /* 文字 */
    .emotion-name {
      font-size: 1.3rem;
      color: #4a4239;
      margin-bottom: 6px;
      font-weight: 400;
      letter-spacing: 0.12em;
      opacity: 0;
      transform: translateY(14px);
      transition: all 0.5s ease 0.35s;
    }

    .emotion-desc {
      font-size: 0.9rem;
      color: #7a6d5a;
      font-style: italic;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(14px);
      transition: all 0.5s ease 0.5s;
    }

    .lead-text {
      font-size: 0.95rem;
      color: #6b5d4f;
      font-style: italic;
      cursor: pointer;
      display: inline-block;
      opacity: 0;
      transform: translateY(14px);
      transition: all 0.5s ease 0.65s;
    }

    .lead-text::after {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9b8a0, transparent);
      margin-top: 5px;
    }

    .lead-text:hover { color: #5a5046; }

    .display.show .emotion-name,
    .display.show .emotion-desc,
    .display.show .lead-text {
      opacity: 1;
      transform: translateY(0);
    }

    /* 涟漪 */
    .ripple {
      position: absolute;
      border: 2.5px solid var(--ripple-color);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes ripple-expand {
      0% { transform: scale(0.5); opacity: 0.65; }
      100% { transform: scale(3); opacity: 0; }
    }

    /* 底部 */
    .brand {
      position: absolute;
      bottom: 35px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: #a89880;
      letter-spacing: 0.25em;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="water-bg"></div>

  <!-- 背景橘色锦鲤 -->
  <div class="bg-koi koi1">
    <div class="koi-body">
      <div class="koi-scales"></div>
      <div class="koi-eye"></div>
      <div class="koi-mouth"></div>
      <div class="koi-fin dorsal"></div>
      <div class="koi-fin pectoral"></div>
      <div class="sparkle" style="left: 20px; top: 8px; animation-delay: 0s;"></div>
      <div class="sparkle" style="left: 35px; top: 15px; animation-delay: 0.7s;"></div>
    </div>
    <div class="koi-tail"></div>
  </div>

  <div class="bg-koi koi2">
    <div class="koi-body">
      <div class="koi-scales"></div>
      <div class="koi-eye"></div>
      <div class="koi-mouth"></div>
      <div class="koi-fin dorsal"></div>
      <div class="koi-fin pectoral"></div>
      <div class="sparkle" style="left: 20px; top: 8px; animation-delay: 0.3s;"></div>
      <div class="sparkle" style="left: 35px; top: 15px; animation-delay: 1s;"></div>
    </div>
    <div class="koi-tail"></div>
  </div>

  <div class="bg-koi koi3">
    <div class="koi-body">
      <div class="koi-scales"></div>
      <div class="koi-eye"></div>
      <div class="koi-mouth"></div>
      <div class="koi-fin dorsal"></div>
      <div class="koi-fin pectoral"></div>
      <div class="sparkle" style="left: 20px; top: 8px; animation-delay: 0.5s;"></div>
      <div class="sparkle" style="left: 35px; top: 15px; animation-delay: 1.2s;"></div>
    </div>
    <div class="koi-tail"></div>
  </div>

  <div class="title-area">
    <h2>此刻，你是什么颜色</h2>
    <div class="guide-text" id="guide">每一种情绪都值得被看见</div>
  </div>

  <div class="pond" id="pond">
    <!-- 超大荷叶 -->
    <div class="lotus-leaf">
      <div class="leaf-glow"></div>
      <div class="vein"></div>
      <div class="vein"></div>
      <div class="vein"></div>
      <div class="vein"></div>
      <div class="vein"></div>
      <div class="vein"></div>
    </div>

    <!-- 渔网 -->
    <div class="net" id="net">
      <svg viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="50" fill="none" stroke="#9a8070" stroke-width="3" opacity="0.9"/>
        <circle cx="55" cy="55" r="46" fill="none" stroke="#b8a090" stroke-width="1.5" opacity="0.7"/>
        <g stroke="#a89888" stroke-width="0.9" opacity="0.55">
          <line x1="55" y1="5" x2="55" y2="105"/>
          <line x1="5" y1="55" x2="105" y2="55"/>
          <line x1="18" y1="18" x2="92" y2="92"/>
          <line x1="92" y1="18" x2="18" y2="92"/>
          <line x1="55" y1="5" x2="88" y2="25"/>
          <line x1="55" y1="5" x2="22" y2="25"/>
          <line x1="55" y1="105" x2="88" y2="85"/>
          <line x1="55" y1="105" x2="22" y2="85"/>
        </g>
        <path d="M 18 70 Q 55 92 92 70" fill="none" stroke="#9a8070" stroke-width="2" opacity="0.8"/>
        <path d="M 23 73 Q 55 88 87 73" fill="none" stroke="#b8a090" stroke-width="1.2" opacity="0.6"/>
        <line x1="55" y1="5" x2="55" y2="-20" stroke="#9a8070" stroke-width="3"/>
      </svg>
    </div>

    <!-- 中央展示 -->
    <div class="display" id="display">
      <div class="creature-home" id="creatureHome"></div>
      <div class="emotion-name" id="eName"></div>
      <div class="emotion-desc" id="eDesc"></div>
      <div class="lead-text" id="lead" onclick="goNext()">让它随波，流入你的笔下</div>
    </div>
  </div>

  <div class="brand">情绪之境 · 情绪池</div>

  <script>
    const emotions = [
      { id: "warmth", name: "温暖黄", desc: "被阳光晒过", color: "#e8d4b8", glow: "#f4e4c8", type: "koi", guide: "把阳光的温度，存进文字" },
      { id: "anticipation", name: "期待粉", desc: "心在扑通跳", color: "#f0d8d8", glow: "#f8e8e8", type: "koi", guide: "把扑通的心跳，系在笔尖" },
      { id: "calm", name: "平静青", desc: "风很轻", color: "#c8d8d0", glow: "#e0f0e8", type: "koi", guide: "这阵风，想带你写点什么" },
      { id: "hope", name: "希望绿", desc: "嫩芽在破土", color: "#d0e0c8", glow: "#e8f8e0", type: "koi", guide: "那棵嫩芽，想在你纸上生长" },
      { id: "anxiety", name: "焦虑橙", desc: "心里有一团火", color: "#e0c8a8", glow: "#c8d8b8", type: "turtle", guide: "让这团火，慢慢冷却" },
      { id: "melancholy", name: "忧郁蓝", desc: "云遮住了光", color: "#b8c8d0", glow: "#a8c8b8", type: "turtle", guide: "把云上的重量，交给池水" },
      { id: "exhaustion", name: "疲惫灰", desc: "力气被抽走了", color: "#d0d0c8", glow: "#b8c8a8", type: "turtle", guide: "让它驮着你，歇一歇" },
      { id: "grievance", name: "委屈紫", desc: "酸涩在胸口", color: "#d8c8d8", glow: "#c8d8c0", type: "turtle", guide: "把酸涩，写给池水听" },
      { id: "heartbreak", name: "心碎粉", desc: "裂开的疼", color: "#e8d0d0", glow: "#d0e0d0", type: "turtle", guide: "让裂缝里的光，慢慢淌出" },
      { id: "emptiness", name: "空洞黑", desc: "什么都没有", color: "#686860", glow: "#809080", type: "turtle", guide: "把空白，写成存在" },
      { id: "chaos", name: "混乱彩", desc: "太多颜色搅在一起", color: "#c8c0c8", glow: "#b8c8b0", type: "turtle", guide: "让搅在一起的颜色，慢慢沉底" },
      { id: "nostalgia", name: "怀旧棕", desc: "时光在倒流", color: "#d8c8a8", glow: "#c8c0a0", type: "turtle", guide: "让倒流的时光，停在这一行" }
    ];

    const pond = document.getElementById('pond');
    const net = document.getElementById('net');
    const display = document.getElementById('display');
    const guide = document.getElementById('guide');
    const creatureHome = document.getElementById('creatureHome');
    const eName = document.getElementById('eName');
    const eDesc = document.getElementById('eDesc');
    const lead = document.getElementById('lead');

    const radius = 185;
    let selected = null;
    let isAnimating = false;

    // 生成12片小荷叶形状的情绪树叶
    emotions.forEach((emo, i) => {
      const angle = (i / 12) * 360 - 90;
      const rad = (angle * Math.PI) / 180;
      const x = Math.cos(rad) * radius;
      const y = Math.sin(rad) * radius;
      const rotation = (i % 2 === 0 ? -5 : 5);

      const leaf = document.createElement('div');
      leaf.className = 'emotion-leaf';
      leaf.id = 'leaf-' + emo.id;
      leaf.style.setProperty('--x', x + 'px');
      leaf.style.setProperty('--y', y + 'px');
      leaf.style.setProperty('--r', rotation + 'deg');
      leaf.style.animationDelay = (i * 0.3) + 's';

      const leafBody = document.createElement('div');
      leafBody.className = 'leaf-body';
      leafBody.style.backgroundColor = emo.color;

      leaf.appendChild(leafBody);

      leaf.addEventListener('mouseenter', () => {
        if (!isAnimating && !selected) guide.textContent = '这是' + emo.name + '的感觉';
      });

      leaf.addEventListener('mouseleave', () => {
        if (!selected) guide.textContent = '每一种情绪都值得被看见';
      });

      leaf.addEventListener('click', () => catchLeaf(emo, leaf, x, y));

      pond.appendChild(leaf);
    });

    function catchLeaf(emo, leafElement, x, y) {
      if (isAnimating || selected === emo.id) return;
      isAnimating = true;
      selected = emo.id;

      guide.textContent = emo.desc + '，原来是这样';

      net.classList.add('active');
      net.style.left = 'calc(50% + ' + x + 'px)';
      net.style.top = 'calc(50% + ' + y + 'px)';
      net.style.transform = 'translate(-50%, -50%)';

      setTimeout(() => {
        document.querySelectorAll('.emotion-leaf').forEach(l => {
          if (l !== leafElement) l.classList.add('faded');
        });
        net.style.left = '50%';
        net.style.top = '50%';
        leafElement.classList.add('caught');
        createRipple(emo.glow);
      }, 700);

      setTimeout(() => {
        net.classList.remove('active');
        showCreature(emo);
      }, 1400);
    }

    function createRipple(color) {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple';
          ripple.style.cssText = 'width: 180px; height: 180px; left: 50%; top: 50%; margin-left: -90px; margin-top: -90px; --ripple-color: ' + color + '; animation: ripple-expand 3s ease-out forwards;';
          pond.appendChild(ripple);
          setTimeout(() => ripple.remove(), 3000);
        }, i * 400);
      }
    }

    function showCreature(emo) {
      display.classList.add('show');
      creatureHome.innerHTML = '';

      if (emo.type === 'koi') {
        const container = document.createElement('div');
        container.className = 'koi-container';

        container.innerHTML = `
          <div class="koi-wrapper">
            <div class="koi-main">
              <div class="koi-scales"></div>
            </div>
            <div class="koi-head">
              <div class="koi-eye"></div>
              <div class="koi-mouth"></div>
            </div>
            <div class="koi-tail"></div>
            <div class="koi-fin dorsal"></div>
            <div class="koi-fin pectoral"></div>
          </div>`;

        creatureHome.appendChild(container);
        setTimeout(() => container.classList.add('show'), 200);
        setTimeout(() => container.classList.add('swimming'), 600);
      } else {
        const container = document.createElement('div');
        container.className = 'turtle-container';

        container.innerHTML = `
          <div class="turtle-shell"></div>
          <div class="turtle-head"></div>
          <div class="turtle-leg front-left"></div>
          <div class="turtle-leg front-right"></div>
          <div class="turtle-leg back-left"></div>
          <div class="turtle-leg back-right"></div>`;

        creatureHome.appendChild(container);
        setTimeout(() => container.classList.add('show'), 200);
        setTimeout(() => container.classList.add('swimming'), 600);
      }

      eName.textContent = emo.name;
      eDesc.textContent = emo.desc;
      lead.textContent = emo.guide;
      isAnimating = false;
    }

    function goNext() {
      if (!selected) return;
      const emo = emotions.find(e => e.id === selected);
      localStorage.setItem('currentEmotion', JSON.stringify(emo));
      alert('已选择：' + emo.name + '\n即将进入书写页');
    }
  </script>
</body>
</html>
